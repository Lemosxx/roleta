<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Surpresa pra Você ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
    font-family: 'Fredoka', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; width: 100vw; overflow: hidden; color: #4a4a4a;
}

.glass-panel {
    background: rgba(255, 255, 255, 0.6); 
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border: 2px solid rgba(255, 255, 255, 0.8); 
    border-radius: 30px; padding: 30px 20px;
    box-shadow: 0 15px 35px rgba(255, 105, 135, 0.25); 
    width: 92%; max-width: 380px;
    text-align: center; transition: all 0.5s ease;
    position: relative; z-index: 10;
}

#tela2, #tela3 { display: none; opacity: 0; }

h2 { color: #d81b60; margin-top: 0; font-size: 1.8rem; }
h3 { color: #e91e63; margin-top: 15px; font-size: 1.3rem; }
p { font-size: 1.1rem; color: #555; margin-top: 10px; font-weight: 500; }

.roleta-container { position: relative; width: 260px; height: 260px; margin: 25px auto; }
.ponteiro { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 40px; z-index: 20; }
canvas { border-radius: 50%; border: 6px solid #fff; width: 100%; height: 100%; }

.gif-box { width: 100%; height: 180px; margin: 15px 0; border-radius: 20px; overflow: hidden; }
.gif-box img { width: 100%; height: 100%; object-fit: cover; }

.area-botoes { 
    display: flex; justify-content: center; align-items: center; 
    gap: 20px; margin-top: 25px; min-height: 80px; position: relative;
}

button { 
    border: none; padding: 16px 28px; font-size: 1.2rem; font-weight: bold; 
    font-family: inherit; border-radius: 50px; cursor: pointer; 
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#girar { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; width: 80%; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

#btn-sim { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; z-index: 100; }
#btn-nao { background: #f8bbd0; color: #880e4f; z-index: 50; }

.resultado { margin-top: 15px; font-weight: 600; color: #c2185b; min-height: 24px; }
.detalhes { text-align: left; background: rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 20px; margin-top: 15px; }

@keyframes chuva { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(20deg); opacity: 0; } }
</style>
</head>

<body>

<div class="glass-panel" id="tela1">
    <h2>🎡 Roleta do Amor 🎡</h2>
    <div class="roleta-container">
        <div class="ponteiro">🔻</div>
        <canvas id="roleta" width="300" height="300"></canvas>
    </div>
    <button id="girar">Girar (1/3) 💖</button>
    <div class="resultado" id="resultado"></div>
</div>

<div class="glass-panel" id="tela2">
    <h2>🎉 DEU CINEMINHA!</h2>
    <div class="gif-box">
        <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueXp6M3RtcGZueXp6M3RtcGZueXp6M3RtcGZueXp6M3RtcGZueSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbMvLUF2S393U9/giphy.gif" alt="Cat GIF">
    </div>
    <p>Não tem jeito, é o destino! Aceita ir comigo? ❤️🍿</p>
    <div class="area-botoes">
        <button id="btn-sim">Sim! ❤️</button>
        <button id="btn-nao">Não 😢</button>
    </div>
</div>

<div class="glass-panel" id="tela3">
    <h2>Nosso encontro 💕</h2>
    <div class="gif-box">
        <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExMnVpYjR4eXp6M3RtcGZueXp6M3RtcGZueXp6M3RtcGZueXp6M3RtcGZueSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/c76IJLufpNUMo/giphy.gif" alt="Bear GIF">
    </div>
    <div class="detalhes">
        <h3>🎬 Filme: O Nosso grande beijo</h3>
        <h3>📍 Local: Shopping Recife</h3>
        <h3>🕒 Horário: 14:00</h3>
    </div>
    <p style="margin-top:15px; color:#e91e63; font-weight:bold;">Mal posso esperar! ❤️</p>
</div>

<script>
const canvas = document.getElementById("roleta");
const ctx = canvas.getContext("2d");
const btnGirar = document.getElementById("girar");
const resultado = document.getElementById("resultado");
const tela1 = document.getElementById("tela1");
const tela2 = document.getElementById("tela2");
const tela3 = document.getElementById("tela3");
const btnSim = document.getElementById("btn-sim");
const btnNao = document.getElementById("btn-nao");

const somVitoria = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function tocarTique() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
    osc.start(); osc.stop(audioCtx.currentTime + 0.04);
}

const premios = ["Shein 🛍️", "Cupom 💎", "Jantar 🍝", "Massagem 💆", "Princesa 👑", "Chocolate 🍫", "CINEMINHA ❤️"];
const cores = ["#ff9a9e", "#fecfef", "#fbc2eb", "#f48fb1", "#ffb199", "#ff0844", "#ffb199"];
const total = premios.length;
const fatia = 360 / total;

let rotacao = 0, girando = false, tentativas = 0, escalaSim = 1;

function desenhar() {
    ctx.clearRect(0,0,300,300);
    for(let i=0; i<total; i++) {
        const ang = i * (Math.PI*2/total);
        ctx.beginPath(); ctx.fillStyle = cores[i%cores.length];
        ctx.moveTo(150,150); ctx.arc(150,150,145,ang,ang+(Math.PI*2/total)); ctx.fill();
        ctx.save(); ctx.translate(150,150); ctx.rotate(ang+(Math.PI*2/total)/2);
        ctx.fillStyle = (i>=5) ? "#fff" : "#4a4a4a"; ctx.font = "bold 14px Fredoka";
        ctx.textAlign = "right"; ctx.fillText(premios[i], 130, 5); ctx.restore();
    }
}
desenhar();

function chover() {
    for(let i=0; i<60; i++) {
        const e = document.createElement("div");
        e.innerText = ['❤️','💖','🎈','🍿'][Math.floor(Math.random()*4)];
        e.style.position = "fixed"; e.style.top = "-50px"; e.style.left = Math.random()*100+"vw";
        e.style.fontSize = "25px"; e.style.zIndex = "1000";
        e.style.animation = `chuva ${Math.random()*3+2}s linear forwards`;
        document.body.appendChild(e); setTimeout(()=>e.remove(), 5000);
    }
}

function iniciarGiro() {
    if(girando) return; girando = true;
    btnGirar.style.opacity = "0.5"; resultado.innerText = "Sorteando...";
    const voltas = 8 + (tentativas*2);
    const alvo = (total - 6) * fatia + 270 - (fatia/2);
    const final = rotacao + (360 * voltas) + (alvo - (rotacao % 360));
    const inicio = performance.now();
    let ultimoTique = 0;

    function animar(agora) {
        let prog = Math.min((agora - inicio)/6000, 1);
        let ease = 1 - Math.pow(1 - prog, 4);
        let atual = rotacao + (final - rotacao) * ease;
        canvas.style.transform = `rotate(${atual}deg)`;
        if(Math.floor(atual/fatia) > ultimoTique) { tocarTique(); ultimoTique = Math.floor(atual/fatia); }
        if(prog < 1) requestAnimationFrame(animar);
        else { rotacao = atual; finalizar(); }
    }
    requestAnimationFrame(animar);
}

function finalizar() {
    somVitoria.play().catch(()=>{});
    const f = ["🎉 DEU CINEMINHA!", "🤔 Ué... Cinema de novo? 😂", "✨ Destino confirmado! ❤️"];
    resultado.innerText = f[tentativas];
    tentativas++;
    if(tentativas < 3) {
        setTimeout(() => { btnGirar.innerText = `Girar (${tentativas+1}/3) 💖`; btnGirar.style.opacity = "1"; girando = false; }, 1500);
    } else {
        setTimeout(() => { tela1.style.display = "none"; tela2.style.display = "block"; setTimeout(()=>tela2.style.opacity="1", 50); }, 2000);
    }
}

btnGirar.addEventListener("click", iniciarGiro);

function fugir(e) {
    if(e.cancelable) e.preventDefault();
    btnNao.style.position = 'fixed';
    btnNao.style.left = Math.max(20, Math.random()*(window.innerWidth-100)) + 'px';
    btnNao.style.top = Math.max(20, Math.random()*(window.innerHeight-50)) + 'px';
    escalaSim += 0.4; btnSim.style.transform = `scale(${escalaSim})`;
}

btnNao.addEventListener('touchstart', fugir);
btnNao.addEventListener('mouseover', fugir);
btnSim.addEventListener('click', () => {
    chover(); tela2.style.display = "none"; tela3.style.display = "block"; setTimeout(()=>tela3.style.opacity="1", 50);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Roleta da Sorte ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            /* Fundo escuro texturizado para destacar o 3D */
            background: radial-gradient(circle at center, #2c0e0e 0%, #100505 100%); 
            font-family: 'Fredoka', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; width: 100vw; overflow: hidden; 
        }
        
        /* Painel flutuante com profundidade */
        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 253, 245, 0.9) 0%, rgba(255, 255, 255, 0.95) 100%);
            border: 4px solid #d4af37; /* Borda Dourada */
            border-radius: 35px;
            padding: 30px 20px; 
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(212, 175, 55, 0.2);
            width: 92%; max-width: 380px; text-align: center; position: relative; z-index: 10;
        }

        #tela2, #tela3 { display: none; opacity: 0; }
        
        h2 { 
            font-family: 'Marcellus', serif; 
            color: #a31d1d; /* Vermelho Cassino */
            font-size: 1.8rem; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 15px; 
            text-shadow: 1px 1px 0px white, 0 0 10px rgba(163, 29, 29, 0.3);
        }
        
        /* === A ROLETA REALISTA 3D === */
        .roleta-wrapper {
            position: relative; width: 280px; height: 280px; margin: 20px auto;
            /* Base Dourada Cônica para efeito metalizado 3D */
            background: conic-gradient(from 180deg at 50% 50%, #b89c31 0%, #d4af37 20%, #f7e08b 40%, #d4af37 60%, #b89c31 80%, #d4af37 100%);
            border-radius: 50%;
            padding: 10px; /* Espaço para a borda dourada */
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* O Centro de metal (onde o ponteiro virtual estaria) */
        .roleta-center {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 50px; height: 50px;
            background: radial-gradient(circle at 30% 30%, #fff 0%, #d4af37 40%, #b89c31 100%);
            border-radius: 50%; z-index: 25;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .ponteiro { 
            position: absolute; top: -25px; left: 50%; 
            transform: translateX(-50%); 
            font-size: 45px; z-index: 30; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); 
        }

        canvas { 
            border-radius: 50%; 
            /* Efeito Cônico nas fatias para volume */
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
            width: 100%; height: 100%; 
            transition: transform 0.1s linear; 
        }

        /* === GIFS E DETALHES === */
        .gif-box { 
            width: 100%; height: 220px; margin: 15px 0; 
            border-radius: 20px; overflow: hidden; 
            border: 4px solid #d4af37; background: #fff; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .gif-box img { width: 100%; height: 100%; object-fit: contain; }

        .area-botoes { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; min-height: 120px; position: relative; width: 100%; }
        
        /* Botões com efeito de volume */
        button { 
            border: none; padding: 18px; 
            font-size: 1.2rem; font-weight: bold; font-family: inherit; 
            border-radius: 18px; cursor: pointer; text-transform: uppercase; 
            width: 85%;
            transition: all 0.2s ease;
        }
        
        #girar { 
            background: linear-gradient(180deg, #a31d1d 0%, #7c1616 100%); 
            color: #fff; border: 2px solid #d4af37;
            box-shadow: 0 6px 0 #5e1111, 0 8px 15px rgba(0,0,0,0.2); 
        }
        #girar:active { transform: translateY(3px); box-shadow: 0 3px 0 #5e1111, 0 4px 10px rgba(0,0,0,0.2); }

        #btn-sim { 
            background: linear-gradient(180deg, #a31d1d 0%, #7c1616 100%); 
            color: white; border: 2px solid #d4af37;
            box-shadow: 0 0 20px rgba(163, 29, 29, 0.4); 
        }
        #btn-sim:active { transform: scale(0.95); }

        #btn-nao { 
            background: #fff; color: #a31d1d; 
            border: 2px solid #d4af37;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Deboche Estilizado */
        .deboche { position: fixed; color: #ffd700; font-weight: bold; font-size: 1.3rem; pointer-events: none; z-index: 1000; text-shadow: 2px 2px #000; animation: floatUp 1.2s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(1.3); opacity: 0; } }

        .detalhes { text-align: left; background: #fff5e6; padding: 20px; border-radius: 20px; border: 2px dashed #d4af37; margin-top: 15px; box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.1); }
        .detalhes h3 { color: #a31d1d; font-size: 1.1rem; margin-bottom: 5px; }
        @keyframes chuva { 0% { transform: translateY(-10vh); opacity: 1; } 100% { transform: translateY(110vh); opacity: 0; } }
    </style>
</head>
<body>

<div class="glass-panel" id="tela1">
    <h2>🎡 A Grande Sorte 🎡</h2>
    <div class="roleta-wrapper">
        <div class="roleta-center"></div>
        <div class="ponteiro">🔻</div>
        <canvas id="roleta" width="300" height="300"></canvas>
    </div>
    <button id="girar">Tirar Ticket (1/3) ✨</button>
    <div id="resultado" style="margin-top:10px; font-weight:bold; color:#a31d1d; min-height: 25px;"></div>
</div>

<div class="glass-panel" id="tela2">
    <h2>🎟️ Ticket Premiado!</h2>
    <div class="gif-box">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueXp6M3RtcGZueXp6M3RtcGZueXp6M3RtcGZueXp6M3RtcGZueSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbMvLUF2S393U9/giphy.gif" alt="Cat GIF">
    </div>
    <p>O Carrossel parou no lugar certo! Vamos ao cinema? ❤️🍿</p>
    <div class="area-botoes">
        <button id="btn-sim">COM CERTEZA! ❤️</button>
        <button id="btn-nao">TALVEZ NÃO... 😢</button>
    </div>
</div>

<div class="carousel-card" style="display:none;" id="tela3"> </div>

<div class="glass-panel" id="tela3-visual" style="display:none; opacity:0;">
    <h2>🎠 Nosso Bilhete 🎠</h2>
    <div class="gif-box">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMnVpYjR4eXp6M3RtcGZueXp6M3RtcGZueXp6M3RtcGZueXp6M3RtcGZueSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/c76IJLufpNUMo/giphy.gif" alt="Bear GIF">
    </div>
    <div class="detalhes">
        <h3>🎬 Atração: O Nosso Grande Beijo</h3>
        <h3>📍 Pavilhão: Shopping Recife</h3>
        <h3>🕒 Sessão: 14:00</h3>
    </div>
    <p style="margin-top:15px; color:#a31d1d; font-weight:bold;">O show vai começar! ❤️🍿</p>
</div>

<script>
    // Mantivemos a lógica idêntica, apenas ajustando as referências visuais da Tela 3
    const canvas = document.getElementById("roleta");
    const ctx = canvas.getContext("2d");
    const btnGirar = document.getElementById("girar");
    const resultado = document.getElementById("resultado");
    const tela1 = document.getElementById("tela1");
    const tela2 = document.getElementById("tela2");
    const tela3Visual = document.getElementById("tela3-visual"); // Nova referência visual
    const btnSim = document.getElementById("btn-sim");
    const btnNao = document.getElementById("btn-nao");

    let audioCtx;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function tocarTique() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(900, audioCtx.currentTime); // Tom ligeiramente mais alto e metálico
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.04);
        g.gain.setValueAtTime(0.06, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
    }

    const premios = ["Passeio 🎠", "Jantar 🕯️", "Presente 🎁", "Massagem 💆", "Beijos 💋", "Doce 🍬", "CINEMA 🎬"];
    const cores = ["#a31d1d", "#d4af37", "#a31d1d", "#d4af37", "#a31d1d", "#d4af37", "#a31d1d"];
    const total = premios.length;
    const fatia = 360 / total;

    let rotacao = 0, girando = false, tentativas = 0, escalaSim = 1;

    // Desenho da roleta aprimorado com gradientes nas fatias
    function desenhar() {
        ctx.clearRect(0,0,300,300);
        for(let i=0; i<total; i++) {
            const ang = i * (Math.PI*2/total);
            
            // Gradiente Cônico na fatia para dar volume
            ctx.beginPath();
            ctx.fillStyle = cores[i%cores.length];
            ctx.moveTo(150,150);
            ctx.arc(150,150,145,ang,ang+(Math.PI*2/total));
            ctx.fill();
            
            // Sombra interna na fatia
            ctx.lineWidth = 1;
            ctx.strokeStyle = "rgba(0,0,0,0.2)";
            ctx.stroke();

            // Texto com fonte de luxo
            ctx.save();
            ctx.translate(150,150);
            ctx.rotate(ang+(Math.PI*2/total)/2);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 15px 'Marcellus', serif"; // Fonte Sophisticada
            ctx.textAlign = "right";
            ctx.fillText(premios[i], 130, 5);
            ctx.restore();
        }
    }
    desenhar();

    function iniciarGiro() {
        if(girando) return;
        initAudio();
        girando = true;
        btnGirar.style.opacity = "0.5";
        btnGirar.style.boxShadow = "0 2px 0 #5e1111"; // Afunda o botão
        resultado.innerText = "Aguarde a sorte...";
        
        const voltas = 10 + (tentativas * 2);
        const alvo = (total - 6) * fatia + 270 - (fatia/2);
        const final = rotacao + (360 * voltas) + (alvo - (rotacao % 360));
        const inicio = performance.now();
        let ultimoTique = 0;

        function animar(agora) {
            let prog = Math.min((agora - inicio)/5500, 1); // Giro um pouco mais rápido e dinâmico
            let ease = 1 - Math.pow(1 - prog, 5); // Ease-out mais acentuado
            let atual = rotacao + (final - rotacao) * ease;
            canvas.style.transform = `rotate(${atual}deg)`;
            
            if(Math.floor(atual/fatia) > ultimoTique) { 
                tocarTique(); 
                ultimoTique = Math.floor(atual/fatia); 
            }
            
            if(prog < 1) {
                requestAnimationFrame(animar);
            } else {
                rotacao = atual;
                finalizar();
            }
        }
        requestAnimationFrame(animar);
    }

    function finalizar() {
        const f = ["🎉 DEU CINEMA!", "🤔 Cinema de novo?!", "✨ É O CINEMA! ❤️"];
        resultado.innerText = f[tentativas];
        tentativas++;
        if(tentativas < 3) {
            setTimeout(() => { 
                btnGirar.innerText = `Tentar de novo (${tentativas+1}/3)`; 
                btnGirar.style.opacity = "1";
                btnGirar.style.boxShadow = "0 6px 0 #5e1111, 0 8px 15px rgba(0,0,0,0.2)"; // Volta o botão
                girando = false; 
            }, 1500);
        } else {
            setTimeout(() => { 
                tela1.style.display = "none"; 
                tela2.style.display = "block"; 
                setTimeout(() => tela2.style.opacity = "1", 50); 
            }, 1500);
        }
    }

    btnGirar.addEventListener("click", iniciarGiro);

    function fugir(e) {
        if(e.cancelable) e.preventDefault();
        
        const frases = ["QUASE!", "ERROU!", "TENTA OUTRA!", "LENTA!", "OPA!"];
        const txt = document.createElement("div");
        txt.className = "deboche";
        txt.innerText = frases[Math.floor(Math.random()*frases.length)];
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        txt.style.left = x + "px"; txt.style.top = y + "px";
        document.body.appendChild(txt);
        setTimeout(() => txt.remove(), 1200);

        btnNao.style.position = 'fixed';
        btnNao.style.left = Math.max(20, Math.random()*(window.innerWidth-120)) + 'px';
        btnNao.style.top = Math.max(20, Math.random()*(window.innerHeight-60)) + 'px';
        
        btnNao.style.opacity = '0';
        setTimeout(() => { btnNao.style.opacity = '1'; }, 400);

        escalaSim += 0.45; // Cresce um pouco mais
        btnSim.style.transform = `scale(${escalaSim})`;
    }

    btnNao.addEventListener('touchstart', fugir, { passive: false });
    btnNao.addEventListener('click', fugir);

    btnSim.addEventListener('click', () => {
        // Transição para a nova Tela 3 Visual
        tela2.style.display = "none"; 
        tela3Visual.style.display = "block"; 
        setTimeout(() => {
            tela3Visual.style.opacity = "1";
            // Chuva de confetes de luxo (Dourado e Vermelho)
            for(let i=0; i<60; i++) {
                const e = document.createElement("div");
                e.innerText = ['✨','❤️','🎟️','💰'][Math.floor(Math.random()*4)];
                e.style.position = "fixed"; e.style.top = "-50px"; e.style.left = Math.random()*100+"vw";
                e.style.fontSize = "30px"; e.style.animation = `chuva ${Math.random()*2+2}s linear forwards`;
                document.body.appendChild(e);
            }
        }, 50);
    });
</script>
</body>
</html>

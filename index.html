<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Surpresa pra Você ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
    font-family: 'Fredoka', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; width: 100vw; overflow: hidden; color: #4a4a4a;
}

.glass-panel {
    background: rgba(255, 255, 255, 0.6); 
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border: 2px solid rgba(255, 255, 255, 0.8); 
    border-radius: 30px; padding: 30px 20px;
    box-shadow: 0 15px 35px rgba(255, 105, 135, 0.25); 
    width: 92%; max-width: 380px;
    text-align: center; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
    position: relative; z-index: 10;
}

#tela2, #tela3 { display: none; opacity: 0; transform: translateY(20px); }

h2 { color: #d81b60; margin-top: 0; font-size: 1.8rem; text-shadow: 1px 1px 0px white; }
h3 { color: #e91e63; margin-top: 15px; font-size: 1.3rem; }
p { font-size: 1.1rem; color: #555; margin-top: 10px; font-weight: 500; }

/* ROLETA ESTILIZADA */
.roleta-container { 
    position: relative; width: 280px; height: 280px; margin: 25px auto; 
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
}

.ponteiro { 
    position: absolute; top: -22px; left: 50%; transform: translateX(-50%); 
    font-size: 45px; z-index: 20; 
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    animation: bounce 2s infinite;
}

@keyframes bounce { 0%, 100% { top: -22px; } 50% { top: -28px; } }

canvas { 
    border-radius: 50%; border: 8px solid #fff; width: 100%; height: 100%; 
    transition: transform 0.1s linear;
}

img { 
    width: 100%; max-height: 180px; object-fit: contain; 
    margin: 15px 0; border-radius: 20px; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.area-botoes { 
    display: flex; justify-content: center; align-items: center; 
    gap: 15px; margin-top: 25px; min-height: 100px; 
}

button { 
    border: none; padding: 16px 32px; font-size: 1.2rem; font-weight: bold; 
    font-family: inherit; border-radius: 50px; cursor: pointer; 
    box-shadow: 0 6px 20px rgba(255, 75, 43, 0.3); 
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#girar { 
    background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; 
    width: 85%; animation: pulse-anim 2s infinite; 
}

@keyframes pulse-anim { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

#btn-sim { 
    background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; 
    z-index: 1000;
}

#btn-nao { 
    background: #f8bbd0; color: #880e4f; 
    z-index: 50; position: relative;
}

.resultado { margin-top: 20px; font-weight: 600; font-size: 1.2rem; color: #c2185b; min-height: 28px; }

.detalhes { 
    text-align: left; background: rgba(255, 255, 255, 0.8); 
    padding: 20px; border-radius: 20px; margin-top: 20px; 
}
.detalhes h3 { margin-top: 10px; font-size: 1.2rem; color: #ad1457; }

@keyframes chuva { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(20deg); opacity: 0; } }
</style>
</head>

<body>

<div class="glass-panel" id="tela1">
    <h2>🎡 Roleta do Amor 🎡</h2>
    <div class="roleta-container">
        <div class="ponteiro">🔻</div>
        <canvas id="roleta" width="300" height="300"></canvas>
    </div>
    <button id="girar">Girar (1/3) 💖</button>
    <div class="resultado" id="resultado"></div>
</div>

<div class="glass-panel" id="tela2">
    <h2>🎉 DEU CINEMINHA!</h2>
    <img src="https://media.tenor.com/T_i_X9t568AAAAAi/happy-cat-smile.gif">
    <p>Não tem jeito, é o destino! Aceita ir comigo? ❤️🍿</p>
    <div class="area-botoes">
        <button id="btn-sim">Sim! ❤️</button>
        <button id="btn-nao">Não 😢</button>
    </div>
</div>

<div class="glass-panel" id="tela3">
    <h2>Nosso encontro 💕</h2>
    <img src="https://media.tenor.com/On7y968aN8AAAAAi/milk-and-mocha-bear.gif">
    <div class="detalhes">
        <h3>🎬 Filme: O Nosso grande beijo</h3>
        <h3>📍 Local: Shopping Recife</h3>
        <h3>🕒 Horário: 14:00</h3>
    </div>
    <p style="margin-top:15px; color:#e91e63; font-weight:bold;">Mal posso esperar! ❤️</p>
</div>

<script>
const canvas = document.getElementById("roleta");
const ctx = canvas.getContext("2d");
const btnGirar = document.getElementById("girar");
const resultado = document.getElementById("resultado");
const tela1 = document.getElementById("tela1");
const tela2 = document.getElementById("tela2");
const tela3 = document.getElementById("tela3");
const btnSim = document.getElementById("btn-sim");
const btnNao = document.getElementById("btn-nao");

const somVitoria = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function tocarTique() {
    if(!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
    osc.start(); osc.stop(audioCtx.currentTime + 0.04);
}

const premios = ["Carrinho Shein 🛍️", "Cupom R$100 💎", "Jantar 🍝", "Massagem 💆", "Dia de Princesa 👑", "Chocolate 🍫", "CINEMINHA ❤️"];
const cores = ["#ff9a9e", "#fecfef", "#fbc2eb", "#f48fb1", "#ffb199", "#ff0844", "#ffb199"];
const totalPremios = premios.length;
const anguloFatia = 360 / totalPremios;

let rotacaoAcumulada = 0;
let girando = false;
let escalaSim = 1;
let tentativas = 0;

function desenhar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < totalPremios; i++) {
        const ang = i * (Math.PI * 2 / totalPremios);
        ctx.beginPath();
        ctx.fillStyle = cores[i % cores.length];
        ctx.moveTo(150, 150);
        ctx.arc(150, 150, 145, ang, ang + (Math.PI * 2 / totalPremios));
        ctx.fill();
        ctx.lineWidth = 3; ctx.strokeStyle = "#ffffff"; ctx.stroke();
        
        ctx.save();
        ctx.translate(150, 150);
        ctx.rotate(ang + (Math.PI * 2 / totalPremios) / 2);
        ctx.fillStyle = (i === 5 || i === 6) ? "#ffffff" : "#4a4a4a"; 
        ctx.font = "bold 14px 'Fredoka', sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(premios[i], 130, 5);
        ctx.restore();
    }
}
desenhar();

function chover(emojis) {
    for (let i = 0; i < 70; i++) {
        const el = document.createElement("div");
        el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.position = "fixed"; el.style.top = "-50px";
        el.style.left = Math.random() * 100 + "vw";
        el.style.fontSize = Math.random() * 25 + 20 + "px";
        el.style.zIndex = "9999";
        el.style.animation = `chuva ${Math.random() * 3 + 2}s linear forwards`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
    }
}

function iniciarGiro() {
    if (girando) return;
    girando = true;
    btnGirar.style.animation = "none";
    btnGirar.style.opacity = "0.5";
    resultado.innerText = "Sorteando... 🫣";

    const voltas = 8 + (tentativas * 2); 
    const indexAlvo = 6; // Cinema
    const destinoGraus = (totalPremios - indexAlvo) * anguloFatia + 270 - (anguloFatia / 2);
    const rotacaoFinal = rotacaoAcumulada + (360 * voltas) + (destinoGraus - (rotacaoAcumulada % 360));
    
    const duracao = 6000;
    const inicio = performance.now();
    let ultimoTique = 0;

    function animar(agora) {
        let passado = agora - inicio;
        let progresso = Math.min(passado / duracao, 1);
        let ease = 1 - Math.pow(1 - progresso, 4);
        let atual = rotacaoAcumulada + (rotacaoFinal - rotacaoAcumulada) * ease;
        
        canvas.style.transform = `rotate(${atual}deg)`;

        if (Math.floor(atual / anguloFatia) > ultimoTique) {
            tocarTique();
            ultimoTique = Math.floor(atual / anguloFatia);
        }

        if (progresso < 1) {
            requestAnimationFrame(animar);
        } else {
            rotacaoAcumulada = atual;
            finalizar();
        }
    }
    requestAnimationFrame(animar);
}

function finalizar() {
    somVitoria.play().catch(()=>{});
    const frases = ["🎉 DEU CINEMINHA! ❤️🍿", "🤔 Ué... Cinema de novo? 😂", "✨ Destino confirmado! ❤️"];
    resultado.innerText = frases[tentativas];
    tentativas++;

    if (tentativas < 3) {
        setTimeout(() => {
            btnGirar.innerText = `Girar (${tentativas + 1}/3) 💖`;
            btnGirar.style.opacity = "1";
            btnGirar.style.animation = "pulse-anim 2s infinite";
            girando = false;
        }, 1500);
    } else {
        setTimeout(() => {
            tela1.style.opacity = "0";
            setTimeout(() => {
                tela1.style.display = "none";
                tela2.style.display = "flex";
                tela2.style.flexDirection = "column";
                setTimeout(() => { tela2.style.opacity = "1"; tela2.style.transform = "translateY(0)"; }, 50); 
            }, 500);
        }, 2000);
    }
}

btnGirar.addEventListener("click", iniciarGiro);

function fugir(e) {
    if (e.cancelable) e.preventDefault();
    const maxX = window.innerWidth - btnNao.offsetWidth - 30;
    const maxY = window.innerHeight - btnNao.offsetHeight - 30;
    
    btnNao.style.position = 'fixed';
    btnNao.style.left = Math.max(15, Math.random() * maxX) + 'px';
    btnNao.style.top = Math.max(15, Math.random() * maxY) + 'px';

    escalaSim += 0.4; 
    btnSim.style.transform = `scale(${escalaSim})`;
}

btnNao.addEventListener('touchstart', fugir);
btnNao.addEventListener('mouseover', fugir);

btnSim.addEventListener('click', () => {
    chover(['🎈', '❤️', '💖', '🍿']);
    tela2.style.opacity = "0";
    setTimeout(() => {
        tela2.style.display = "none";
        tela3.style.display = "block";
        setTimeout(() => { tela3.style.opacity = "1"; tela3.style.transform = "translateY(0)"; }, 50); 
    }, 500);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Surpresa pra Você ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    /* Fundo fofo em tons pastel */
    background: linear-gradient(135deg, #ffc3a0 0%, #ffafbd 100%);
    font-family: 'Fredoka', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; width: 100vw; overflow: hidden; color: #4a4a4a;
}

/* Painel estilo bolha/nuvem */
.glass-panel {
    background: rgba(255, 255, 255, 0.75); 
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border: 4px solid rgba(255, 255, 255, 0.9); 
    border-radius: 40px; padding: 30px 20px;
    box-shadow: 0 15px 35px rgba(255, 154, 162, 0.3), inset 0 0 20px rgba(255,255,255,0.8); 
    width: 92%; max-width: 400px;
    text-align: center; transition: opacity 0.5s ease; position: relative; z-index: 10;
}

#tela2, #tela3 { display: none; opacity: 0; }

h2 { color: #d81b60; margin-top: 0; font-size: 1.8rem; text-shadow: 2px 2px 0px white; }
p { font-size: 1.15rem; color: #880e4f; margin-top: 10px; font-weight: 500; }

/* ROLETA FOFA */
.roleta-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
.ponteiro { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 45px; z-index: 20; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
canvas { 
    border-radius: 50%; 
    border: 8px solid #fff; 
    width: 100%; height: 100%; 
    box-shadow: 0 10px 20px rgba(255, 154, 162, 0.5);
}

/* GIFS GRANDES E SEM CORTAR */
.gif-box { 
    width: 100%; height: 250px; margin: 15px 0; border-radius: 25px; 
    display: flex; justify-content: center; align-items: center;
    background: rgba(255, 255, 255, 0.6); border: 3px dashed #ffb7b2;
}
.gif-box img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }

.area-botoes { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; min-height: 100px; position: relative; }

/* BOTÕES ARREDONDADOS */
button { 
    border: none; padding: 18px 30px; font-size: 1.2rem; font-weight: bold; 
    font-family: inherit; border-radius: 50px; cursor: pointer; 
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
}

#girar { 
    background: linear-gradient(180deg, #ff758c 0%, #ff7eb3 100%); color: white; width: 85%; 
    box-shadow: 0 6px 0 #d81b60, 0 10px 15px rgba(255, 117, 140, 0.3); 
    animation: pulse 2s infinite; margin-top: 10px;
}
#girar:active { transform: translateY(4px); box-shadow: 0 2px 0 #d81b60; animation: none; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

#btn-sim { 
    background: linear-gradient(180deg, #ff758c 0%, #ff7eb3 100%); color: white; z-index: 100; position: relative;
    box-shadow: 0 6px 0 #d81b60, 0 0 20px rgba(255, 117, 140, 0.5);
}
#btn-sim:active { transform: translateY(4px) scale(0.98); box-shadow: 0 2px 0 #d81b60; }

#btn-nao { 
    background: #fff; color: #d81b60; z-index: 50; position: relative;
    box-shadow: 0 6px 0 #ffb7b2; border: 2px solid #ffb7b2;
}

/* BALÃO DE DEBOCHE FOFO */
.deboche {
    position: fixed; color: #d81b60; font-weight: 700; font-size: 1.2rem;
    pointer-events: none; z-index: 200;
    background: rgba(255, 255, 255, 0.9); padding: 10px 18px; 
    border-radius: 20px; border: 3px solid #ffb7b2;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    animation: subirSumiLento 2s ease-out forwards;
}

@keyframes subirSumiLento {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    15% { opacity: 1; transform: translateY(-30px) scale(1.1); }
    80% { opacity: 1; transform: translateY(-70px) scale(1); }
    100% { opacity: 0; transform: translateY(-100px) scale(0.8); }
}

.resultado { margin-top: 15px; font-weight: 700; color: #d81b60; min-height: 24px; font-size: 1.3rem; }
.detalhes { text-align: left; background: rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 25px; margin-top: 15px; border: 3px dashed #ffb7b2; }
.detalhes h3 { color: #d81b60; margin-bottom: 5px; font-size: 1.15rem; }

@keyframes chuvaLenta { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
</style>
</head>

<body>

<div class="glass-panel" id="tela1">
    <h2>🎡 Roleta do Amor 🎡</h2>
    
    <div class="roleta-container">
        <div class="ponteiro">💖</div>
        <canvas id="roleta" width="300" height="300"></canvas>
    </div>

    <button id="girar">Girar (1/3) ✨</button>
    <div class="resultado" id="resultado"></div>
</div>

<div class="glass-panel" id="tela2">
    <h2>🎉 DEU CINEMINHA!</h2>
    <div class="gif-box">
        <img src="https://media.tenor.com/T_i_X9t568AAAAAi/happy-cat-smile.gif" alt="Cat GIF">
    </div>
    <p>Não tem jeito, é o destino! Aceita ir comigo? ❤️🍿</p>
    <div class="area-botoes">
        <button id="btn-sim">Sim! ❤️</button>
        <button id="btn-nao">Não 😢</button>
    </div>
</div>

<div class="glass-panel" id="tela3">
    <h2>Nosso encontro 💕</h2>
    <div class="gif-box">
        <img src="https://media.tenor.com/On7y968aN8AAAAAi/milk-and-mocha-bear.gif" alt="Bear GIF">
    </div>
    <div class="detalhes">
        <h3>🎬 Filme: O Nosso grande beijo</h3>
        <h3>📍 Local: Shopping Recife</h3>
        <h3>🕒 Horário: 14:00</h3>
    </div>
    <p style="margin-top:15px; color:#d81b60; font-weight:bold; font-size: 1.3rem;">Mal posso esperar! ❤️</p>
</div>

<script>
const canvas = document.getElementById("roleta");
const ctx = canvas.getContext("2d");
const btnGirar = document.getElementById("girar");
const resultado = document.getElementById("resultado");
const tela1 = document.getElementById("tela1");
const tela2 = document.getElementById("tela2");
const tela3 = document.getElementById("tela3");
const btnSim = document.getElementById("btn-sim");
const btnNao = document.getElementById("btn-nao");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const frasesDeboche = [
    "Errou feio! 😂", 
    "Tá lenta hein, lenda? 🐢", 
    "Aqui não, amada! 😜", 
    "Tenta de novo! ✨", 
    "Quase... mas não! 🤏", 
    "O destino quer o SIM! 💖",
    "Pode desistir desse botão! 😈"
];

function tocarTique() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(600, audioCtx.currentTime); // Som mais suave
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
    osc.start(); osc.stop(audioCtx.currentTime + 0.04);
}

// Paleta em tons pastel fofinhos
const premios = ["Shein 🛍️", "Cupom 💎", "Jantar 🍝", "Massagem 💆", "Princesa 👑", "Chocolate 🍫", "CINEMINHA ❤️"];
const cores = ["#FFB7B2", "#FFDAC1", "#E2F0CB", "#B5EAD7", "#C7CEEA", "#F1CBFF", "#ff758c"]; // O cinema fica em destaque
const total = premios.length;
const fatia = 360 / total;

let rotacao = 0, girando = false, tentativas = 0, escalaSim = 1;

function desenhar() {
    ctx.clearRect(0,0,300,300);
    for(let i=0; i<total; i++) {
        const ang = i * (Math.PI*2/total);
        ctx.beginPath(); ctx.fillStyle = cores[i%cores.length];
        ctx.moveTo(150,150); ctx.arc(150,150,150,ang,ang+(Math.PI*2/total)); ctx.fill();
        ctx.save(); ctx.translate(150,150); ctx.rotate(ang+(Math.PI*2/total)/2);
        
        // Cor do texto baseada na cor do fundo (Cinema é branco, os outros são escuros)
        ctx.fillStyle = (i === 6) ? "#fff" : "#880e4f"; 
        ctx.font = "bold 16px 'Fredoka'"; 
        ctx.textAlign = "right"; ctx.fillText(premios[i], 135, 5); ctx.restore();
    }
}
desenhar();

function choverFestiva() {
    const emojis = ['❤️', '💖', '🎈', '🍿', '✨', '💕', '🌸', '🌟'];
    for(let i=0; i<120; i++) {
        const e = document.createElement("div");
        e.innerText = emojis[Math.floor(Math.random()*emojis.length)];
        e.style.position = "fixed"; e.style.top = "-50px"; e.style.left = Math.random()*100+"vw";
        e.style.fontSize = Math.random() * 25 + 15 + "px"; e.style.zIndex = "1000";
        // Chuva mais lenta e duradoura
        e.style.animation = `chuvaLenta ${Math.random()*4+3}s linear forwards`;
        document.body.appendChild(e); setTimeout(()=>e.remove(), 7000);
    }
}

function iniciarGiro() {
    if(girando) return; girando = true;
    btnGirar.style.opacity = "0.5"; resultado.innerText = "Sorteando... 🫣";
    const voltas = 8 + (tentativas*2);
    const alvo = (total - 6) * fatia + 270 - (fatia/2);
    const final = rotacao + (360 * voltas) + (alvo - (rotacao % 360));
    const inicio = performance.now();
    let ultimoTique = 0;

    function animar(agora) {
        let prog = Math.min((agora - inicio)/6000, 1);
        let ease = 1 - Math.pow(1 - prog, 4);
        let atual = rotacao + (final - rotacao) * ease;
        canvas.style.transform = `rotate(${atual}deg)`;
        if(Math.floor(atual/fatia) > ultimoTique) { tocarTique(); ultimoTique = Math.floor(atual/fatia); }
        if(prog < 1) requestAnimationFrame(animar);
        else { rotacao = atual; finalizar(); }
    }
    requestAnimationFrame(animar);
}

function finalizar() {
    const f = ["🎉 DEU CINEMINHA!", "🤔 Ué... Cinema de novo? 😂", "✨ Destino confirmado! ❤️"];
    resultado.innerText = f[tentativas];
    tentativas++;
    if(tentativas < 3) {
        setTimeout(() => { btnGirar.innerText = `Girar (${tentativas+1}/3) ✨`; btnGirar.style.opacity = "1"; girando = false; }, 1500);
    } else {
        setTimeout(() => { tela1.style.display = "none"; tela2.style.display = "block"; setTimeout(()=>tela2.style.opacity="1", 50); }, 2000);
    }
}

btnGirar.addEventListener("click", iniciarGiro);

function fugir(e) {
    if(e.cancelable) e.preventDefault();
    
    // Tira onda (Balão de deboche)
    const texto = document.createElement("div");
    texto.className = "deboche";
    texto.innerText = frasesDeboche[Math.floor(Math.random()*frasesDeboche.length)];
    
    const posX = e.touches ? e.touches[0].clientX : e.clientX;
    const posY = e.touches ? e.touches[0].clientY : e.clientY;
    texto.style.left = (posX - 60) + "px";
    texto.style.top = (posY - 40) + "px";
    
    document.body.appendChild(texto);
    // Fica na tela por 2 segundos
    setTimeout(() => texto.remove(), 2000);

    // Some por 0.8 segundos (um "gelo" maior)
    btnNao.style.opacity = '0';
    btnNao.style.pointerEvents = 'none';

    setTimeout(() => {
        btnNao.style.position = 'fixed';
        btnNao.style.left = Math.max(20, Math.random()*(window.innerWidth-120)) + 'px';
        btnNao.style.top = Math.max(20, Math.random()*(window.innerHeight-60)) + 'px';
        btnNao.style.opacity = '1';
        btnNao.style.pointerEvents = 'auto';
    }, 800); 

    // Aumenta o Sim
    escalaSim += 0.45; 
    btnSim.style.transform = `scale(${escalaSim})`;
}

btnNao.addEventListener('touchstart', fugir, {passive: false});
btnNao.addEventListener('mouseover', fugir);

btnSim.addEventListener('click', () => {
    choverFestiva(); 
    setTimeout(choverFestiva, 1500); // Chuva dupla pra comemorar
    tela2.style.display = "none"; 
    tela3.style.display = "block"; 
    setTimeout(()=>tela3.style.opacity="1", 50);
});
</script>

</body>
</html>

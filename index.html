<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Surpresa pra Você ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
    font-family: 'Fredoka', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; width: 100vw; overflow: hidden; color: #4a4a4a;
}

.glass-panel {
    background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 24px; padding: 30px 20px;
    box-shadow: 0 10px 30px rgba(255, 105, 135, 0.2); width: 90%; max-width: 380px;
    text-align: center; transition: opacity 0.5s ease; position: relative; z-index: 10;
}

#tela2, #tela3 { display: none; opacity: 0; }
h2 { color: #d81b60; margin-top: 0; font-size: 1.8rem; }
h3 { color: #e91e63; margin-top: 15px; font-size: 1.3rem; }
p { font-size: 1.1rem; color: #555; margin-top: 10px; font-weight: 500; }

.roleta-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
.ponteiro { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 40px; z-index: 20; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
canvas { border-radius: 50%; box-shadow: 0 10px 25px rgba(216, 27, 96, 0.3); border: 5px solid #fff; width: 100%; height: 100%; }
img { width: 100%; max-height: 180px; object-fit: contain; margin-top: 10px; border-radius: 15px; pointer-events: none; }

.area-botoes { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; min-height: 80px; }
button { border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; font-family: inherit; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 105, 135, 0.3); touch-action: manipulation; }

#girar { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; width: 80%; margin-top: 15px; animation: pulse-anim 2s infinite; }
@keyframes pulse-anim { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
#btn-sim { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 999; }
#btn-nao { background: #f8bbd0; color: #880e4f; position: relative; z-index: 50; }

.resultado { margin-top: 20px; font-weight: 600; font-size: 1.2rem; color: #c2185b; min-height: 28px; }
.detalhes { text-align: left; background: rgba(255, 255, 255, 0.7); padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.detalhes h3 { margin-top: 10px; font-size: 1.2rem; color: #ad1457; }
.detalhes h3:first-child { margin-top: 0; }

@keyframes chuva { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(20deg); opacity: 0; } }
</style>
</head>

<body>

<div class="glass-panel" id="tela1">
    <h2 id="titulo-roleta">🎡 Roleta do Amor 🎡</h2>
    <div class="roleta-container">
        <div class="ponteiro">🔻</div>
        <canvas id="roleta" width="300" height="300"></canvas>
    </div>
    <button id="girar">Girar (1/3) 💖</button>
    <div class="resultado" id="resultado"></div>
</div>

<div class="glass-panel" id="tela2">
    <h2>🎉 DEU CINEMA!</h2>
    <img src="https://media.tenor.com/On7y968aN8AAAAAi/milk-and-mocha-bear.gif">
    <p>Não tem jeito, é o destino! Aceita ir comigo? ❤️🍿</p>
    <div class="area-botoes">
        <button id="btn-sim">Sim! ❤️</button>
        <button id="btn-nao">Não 😢</button>
    </div>
</div>

<div class="glass-panel" id="tela3">
    <h2>Nosso encontro 💕</h2>
    <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif">
    <div class="detalhes">
        <h3>🎬 Filme: Vingadores <br><span style="font-size:0.9rem; color:#888;">(ou o que você escolher)</span></h3>
        <h3>📍 Local: Shopping Recife</h3>
        <h3>🕒 Horário: 20:00</h3>
    </div>
    <p style="margin-top:15px; color:#e91e63; font-weight:bold;">Mal posso esperar pra te ver! ❤️</p>
</div>

<script>
const canvas = document.getElementById("roleta");
const ctx = canvas.getContext("2d");
const btnGirar = document.getElementById("girar");
const resultado = document.getElementById("resultado");
const tela1 = document.getElementById("tela1");
const tela2 = document.getElementById("tela2");
const tela3 = document.getElementById("tela3");
const btnSim = document.getElementById("btn-sim");
const btnNao = document.getElementById("btn-nao");

const somVitoria = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

let tentativas = 0;
const frasesResultado = [
    "🎉 VOCÊ GANHOU: CINEMA! ❤️🍿",
    "🤔 Ué... Deu CINEMA de novo! ❤️🍿",
    "✨ É o destino! CINEMA de novo! ❤️🍿"
];

function tocarTique() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.05);
    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.05);
}

const premios = ["Carrinho Shein 🛍️", "Cupom R$100 💎", "Jantar 🍝", "Massagem 💆", "Dia de Princesa 👑", "Chocolate 🍫", "CINEMA ❤️"];
const cores = ["#ff9a9e", "#fecfef", "#fbc2eb", "#f48fb1", "#ffb199", "#ff0844", "#ffb199"];
const totalPremios = premios.length;
const anguloFatia = 360 / totalPremios;

let rotacaoAcumulada = 0;
let girando = false;
let escalaSim = 1;

function desenhar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < totalPremios; i++) {
        const ang = i * (Math.PI * 2 / totalPremios);
        ctx.beginPath();
        ctx.fillStyle = cores[i % cores.length];
        ctx.moveTo(150, 150);
        ctx.arc(150, 150, 150, ang, ang + (Math.PI * 2 / totalPremios));
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#ffffff";
        ctx.stroke();
        ctx.save();
        ctx.translate(150, 150);
        ctx.rotate(ang + (Math.PI * 2 / totalPremios) / 2);
        ctx.fillStyle = (i === 5 || i === 6) ? "#ffffff" : "#4a4a4a"; 
        ctx.font = "bold 14px 'Fredoka', sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(premios[i], 135, 5);
        ctx.restore();
    }
}
desenhar();

function choverBaloesECoracoes() {
    const emojis = ['🎈', '❤️', '💖', '💕', '✨', '🍿'];
    for (let i = 0; i < 70; i++) {
        const el = document.createElement("div");
        el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.position = "fixed";
        el.style.top = "-50px"; el.style.left = Math.random() * 100 + "vw";
        el.style.fontSize = Math.random() * 20 + 20 + "px";
        el.style.zIndex = "9999";
        el.style.animation = `chuva ${Math.random() * 3 + 2}s linear forwards`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
    }
}

function iniciarGiro(e) {
    if (e.cancelable) e.preventDefault();
    if (girando) return;
    girando = true;

    btnGirar.style.animation = "none";
    resultado.innerText = "Girando... 🫣";
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const voltasExtras = 7 + (tentativas * 2); 
    const indexCinema = 6; 
    
    // CORREÇÃO CRÍTICA: Alinhamento perfeito com o ponteiro superior (270 graus)
    // O ponteiro do canvas começa em 0 (direita). Para parar no topo, calculamos:
    const destinoGraus = (totalPremios - indexCinema) * anguloFatia + 270 - (anguloFatia / 2);
    
    const rotacaoFinal = (360 * voltasExtras) + destinoGraus;
    const duracao = 6000; 
    const tempoInicio = performance.now();
    
    let tiqueAnterior = Math.floor(rotacaoAcumulada / anguloFatia);

    function animar(tempoAtual) {
        let passado = tempoAtual - tempoInicio;
        let progresso = Math.min(passado / duracao, 1);

        // Ease-out forte para o suspense
        let ease = 1 - Math.pow(1 - progresso, 4);
        let anguloAtual = rotacaoAcumulada + (rotacaoFinal - rotacaoAcumulada) * ease;
        
        canvas.style.transform = `rotate(${anguloAtual}deg)`;

        let tiqueAtual = Math.floor(anguloAtual / anguloFatia);
        if (tiqueAtual > tiqueAnterior) {
            tocarTique();
            if (navigator.vibrate) navigator.vibrate(10);
            tiqueAnterior = tiqueAtual;
        }

        if (progresso < 1) {
            requestAnimationFrame(animar);
        } else {
            rotacaoAcumulada = anguloAtual % 360; 
            finalizar();
        }
    }
    requestAnimationFrame(animar);
}

function finalizar() {
    somVitoria.currentTime = 0;
    somVitoria.play().catch(()=>{});
    
    resultado.innerText = frasesResultado[tentativas];
    tentativas++;

    if (tentativas < 3) {
        setTimeout(() => {
            btnGirar.innerText = `Girar (${tentativas + 1}/3) 💖`;
            btnGirar.style.animation = "pulse-anim 2s infinite";
            girando = false;
        }, 1500);
    } else {
        setTimeout(() => {
            tela1.style.opacity = "0";
            setTimeout(() => {
                tela1.style.display = "none";
                tela2.style.display = "block";
                setTimeout(() => tela2.style.opacity = "1", 50); 
            }, 500);
        }, 2000);
    }
}

btnGirar.addEventListener("touchstart", iniciarGiro, { passive: false });
btnGirar.addEventListener("click", iniciarGiro);

function fugir(e) {
    if (e.cancelable) e.preventDefault();

    const maxX = window.innerWidth - btnNao.offsetWidth - 20;
    const maxY = window.innerHeight - btnNao.offsetHeight - 20;

    btnNao.style.position = 'fixed';
    btnNao.style.left = Math.max(10, Math.random() * maxX) + 'px';
    btnNao.style.top = Math.max(10, Math.random() * maxY) + 'px';

    escalaSim += 0.35; 
    btnSim.style.transform = `scale(${escalaSim})`;
}

btnNao.addEventListener('touchstart', fugir, { passive: false });
btnNao.addEventListener('mouseover', fugir);
btnNao.addEventListener('click', fugir);

function aceitouEncontro(e) {
    if (e.cancelable) e.preventDefault();
    choverBaloesECoracoes();
    tela2.style.opacity = "0";
    setTimeout(() => {
        tela2.style.display = "none";
        tela3.style.display = "block";
        setTimeout(() => tela3.style.opacity = "1", 50); 
    }, 500);
}

btnSim.addEventListener('click', aceitouEncontro);
btnSim.addEventListener('touchstart', aceitouEncontro, { passive: false });
</script>

</body>
</html>
